name: webview_cef
description: Flutter Desktop Webview backed by CEF (Chromium Embedded Framework).
version: 0.2.2
homepage: https://github.com/hlwhl/webview_cef
repository: https://github.com/hlwhl/webview_cef

environment:
  sdk: ">=2.17.1 <4.0.0"
  flutter: ">=2.5.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

# NOTE: The `windows:` platform was intentionally removed. webview_flutter has
# no Windows backend, so this app uses webview_windows (WebView2) on Windows
# instead. Declaring `windows` here pulls webview_cef's Windows CEF native code
# into the build, which fails to compile for us. Dropping it excludes the plugin
# from `flutter pub get`'s generated_plugins.cmake on Windows while keeping the
# Linux/macOS backends intact. The Dart API still imports fine on every platform.
flutter:
  plugin:
    platforms:
      macos:
        pluginClass: WebviewCefPlugin
      linux:
        pluginClass: WebviewCefPlugin
