name: lucide_icons
description: Local fork of lucide_icons patched for Flutter 3.44 where IconData became a final class.
version: 0.257.1
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  fonts:
    - family: Lucide
      fonts:
        - asset: assets/lucide.ttf
