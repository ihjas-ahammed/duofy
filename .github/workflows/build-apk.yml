name: Build APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'builds/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 50

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//' | xargs)
          echo "vname=$VERSION" >> $GITHUB_OUTPUT

      - name: Build release APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Copy APKs to builds directory
        run: |
          VERSION="${{ steps.version.outputs.vname }}"
          mkdir -p builds
          for apk in build/app/outputs/flutter-apk/*-arm*.apk; do
            ABI=$(basename "$apk" | sed 's/app-//' | sed 's/-release.apk//')
            cp "$apk" "builds/duofy-v${VERSION}-${ABI}.apk"
          done
          ls -lh builds/

      - name: Commit and push builds to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add builds/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: add APK builds v${{ steps.version.outputs.vname }} [skip ci]"
            git push origin main
          fi
